<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <style>
        .setup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            position: relative;
            overflow: hidden;
        }

        .setup-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .setup-bg__orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
        }

        .setup-bg__orb--1 {
            width: 450px;
            height: 450px;
            background: rgba(var(--accent-primary-rgb), 0.18);
            top: -15%;
            left: -10%;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .setup-bg__orb--2 {
            width: 350px;
            height: 350px;
            background: rgba(0, 212, 170, 0.12);
            bottom: -10%;
            right: -10%;
            animation: orbFloat 24s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.03); }
        }

        .setup-card {
            width: 100%;
            max-width: 480px;
            padding: var(--space-10);
            animation: fadeInScale 0.5s ease;
        }

        .setup-card__header {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .setup-card__logo {
            width: 56px;
            height: 56px;
            margin: 0 auto var(--space-5);
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
            box-shadow: var(--shadow-glow-primary);
            transition: all 0.3s ease;
        }

        .setup-card__logo--brand {
            background: rgba(99, 102, 241, 0.08);
            border: 1.5px solid rgba(99, 102, 241, 0.25);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .setup-card__title {
            font-size: var(--text-2xl);
            font-weight: var(--weight-bold);
            margin-bottom: var(--space-2);
        }

        .setup-card__subtitle {
            font-size: var(--text-sm);
            color: var(--text-muted);
            line-height: var(--leading-relaxed);
        }

        .setup-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .setup-form .btn--primary {
            margin-top: var(--space-2);
            padding: var(--space-4) var(--space-6);
            font-size: var(--text-base);
        }

        .setup-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }

        .setup-divider {
            border: none;
            border-top: 1px solid var(--glass-border);
            margin: var(--space-4) 0;
        }

        .setup-section-label {
            font-size: var(--text-sm);
            color: var(--text-muted);
            text-align: center;
            margin-bottom: var(--space-2);
        }

        .setup-footer {
            text-align: center;
            margin-top: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .setup-footer a {
            color: var(--accent-primary);
            font-weight: var(--weight-medium);
        }

        .setup-footer a:hover {
            text-decoration: underline;
        }

        .setup-back {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            position: fixed;
            top: var(--space-6);
            left: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
            transition: color var(--transition-fast);
            z-index: 10;
        }

        .setup-back:hover {
            color: var(--text-primary);
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-2);
        }

        .role-option {
            position: relative;
        }

        .role-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-3);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            color: var(--text-muted);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .role-option label:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            color: var(--text-secondary);
        }

        .role-option input:checked + label {
            background: rgba(var(--accent-primary-rgb), 0.12);
            border-color: rgba(var(--accent-primary-rgb), 0.4);
            color: var(--accent-primary);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease; }

        @media (max-width: 480px) {
            .setup-card { padding: var(--space-6); }
            .setup-row { grid-template-columns: 1fr; }
            .setup-back { top: var(--space-4); left: var(--space-4); }
        }
    </style>
</head>
<body>
    <a href="#setup-form" class="skip-link">Skip to form</a>

    <div class="setup-bg" aria-hidden="true">
        <div class="setup-bg__orb setup-bg__orb--1"></div>
        <div class="setup-bg__orb setup-bg__orb--2"></div>
    </div>

    <a href="index.html" class="setup-back" aria-label="Back to landing page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back
    </a>

    <main class="setup-page">
        <!-- Sign Up Card -->
        <div class="setup-card glass-card--elevated" id="signup-card">
            <div class="setup-card__header">
                <div class="setup-card__logo setup-card__logo--brand">
                    <svg class="logo-icon-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 32px; height: 32px;">
                        <defs>
                            <linearGradient id="logo-grad-setup" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4f46e5" />
                                <stop offset="50%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#a855f7" />
                            </linearGradient>
                        </defs>
                        <path d="M16 2L28 8V20L16 30L4 20V8L16 2Z" class="logo-icon-shield" stroke="url(#logo-grad-setup)" stroke-width="2" stroke-linejoin="round" fill="rgba(99, 102, 241, 0.05)" />
                        <path d="M17 7L10 15H16L15 25L22 14H16L17 7Z" class="logo-icon-lightning" fill="url(#logo-grad-setup)" />
                    </svg>
                </div>
                <h1 class="setup-card__title">Create Account</h1>
                <p class="setup-card__subtitle" id="signup-subtitle">Register to access the Anti-Kuddus Protocol platform</p>
            </div>

            <form class="setup-form" id="setup-form" novalidate>
                <!-- Active Institution Fields -->
                <div class="form-group">
                    <label class="form-label form-label--required" for="school-name-display">Institution / School Name</label>
                    <input
                        type="text"
                        id="school-name-display"
                        class="form-input"
                        placeholder="e.g. Dhaka High School"
                        required
                    >
                    <span class="form-error hidden" id="school-name-error"></span>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
                    <div class="form-group">
                        <label class="form-label form-label--required" for="class-name-display">Class</label>
                        <input
                            type="text"
                            id="class-name-display"
                            class="form-input"
                            placeholder="e.g. Class 10"
                            required
                        >
                        <span class="form-error hidden" id="class-name-error"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label--required" for="section-name-display">Section</label>
                        <input
                            type="text"
                            id="section-name-display"
                            class="form-input"
                            placeholder="e.g. Section B"
                            required
                        >
                        <span class="form-error hidden" id="section-name-error"></span>
                    </div>
                </div>

                <!-- Personal Details -->
                <p class="setup-section-label" style="margin-top: var(--space-2); margin-bottom: var(--space-1); text-align: center; color: var(--text-muted); font-size: var(--text-sm);">Your details</p>

                <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: var(--space-4);">
                    <div class="form-group">
                        <label class="form-label form-label--required" for="roll-number">Roll Number</label>
                        <input
                            type="number"
                            id="roll-number"
                            class="form-input"
                            placeholder="e.g. 1"
                            required
                        >
                        <span class="form-error hidden" id="roll-error"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label--required" for="user-name">Full Name</label>
                        <input
                            type="text"
                            id="user-name"
                            class="form-input"
                            placeholder="e.g. Rahim"
                            required
                        >
                        <span class="form-error hidden" id="name-error"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Your Role</label>
                    <div class="role-selector" role="radiogroup" aria-label="Select your role" style="grid-template-columns: repeat(2, 1fr);">
                        <div class="role-option">
                            <input type="radio" name="role" id="role-student" value="student" checked>
                            <label for="role-student">Student</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="role-captain" value="captain">
                            <label for="role-captain">Captain</label>
                        </div>
                    </div>
                </div>

                <!-- Captain designation selection (conditional) -->
                <div class="form-group hidden" id="captain-designation-container">
                    <label class="form-label form-label--required" for="captain-designation">Select Captain Option</label>
                    <select id="captain-designation" class="form-input" style="background: rgba(30, 27, 75, 0.6); border: 1px solid var(--glass-border); color: var(--text-primary); cursor: pointer; padding: var(--space-3); border-radius: var(--radius-md); width: 100%;">
                        <option value="captain">Captain 1</option>
                        <option value="captain_2nd">Captain 2</option>
                        <option value="captain_3rd">Captain 3</option>
                    </select>
                </div>

                <!-- Password -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
                    <div class="form-group">
                        <label class="form-label form-label--required" for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Create password"
                            required
                        >
                        <span class="form-error hidden" id="password-error"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label--required" for="confirm-password">Confirm Password</label>
                        <input
                            type="password"
                            id="confirm-password"
                            class="form-input"
                            placeholder="Confirm password"
                            required
                        >
                        <span class="form-error hidden" id="confirm-error"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary btn--full btn--lg" id="setup-btn" style="margin-top: var(--space-2);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Sign Up
                </button>
            </form>

            <div class="setup-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Guard: if already logged in, redirect to Dashboard
            var session = Storage.get('session');
            if (session && session.isLoggedIn) {
                window.location.href = 'dashboard.html';
                return;
            }

            var config = Storage.get('config') || {};

            var instSetupCard = document.getElementById('inst-setup-card');
            var signupCard = document.getElementById('signup-card');

            // We always show the signup card directly
            if (instSetupCard) instSetupCard.classList.add('hidden');
            if (signupCard) signupCard.classList.remove('hidden');

            // Populate active institution fields (if we have config values)
            var instNameDisplay = document.getElementById('school-name-display');
            var classNameDisplay = document.getElementById('class-name-display');
            var sectionNameDisplay = document.getElementById('section-name-display');

            var cls = config.class || (config.className ? config.className.split(' ')[0] : '');
            var sec = config.section || (config.className ? config.className.split(' ').slice(1).join(' ') : '');

            if (instNameDisplay) instNameDisplay.value = config.schoolName || '';
            if (classNameDisplay) classNameDisplay.value = cls;
            if (sectionNameDisplay) sectionNameDisplay.value = sec;

            var signupSubtitle = document.getElementById('signup-subtitle');
            if (signupSubtitle) {
                if (config.schoolName) {
                    signupSubtitle.textContent = config.schoolName + ' — ' + cls + ' ' + sec;
                } else {
                    signupSubtitle.textContent = 'Register to access the Anti-Kuddus Protocol platform';
                }
            }

            var form = document.getElementById('setup-form');
            if (form) form.addEventListener('submit', handleSignUp);

            // Toggle Captain Designation Dropdown
            var roleRadios = document.querySelectorAll('input[name="role"]');
            var captainContainer = document.getElementById('captain-designation-container');
            if (captainContainer) {
                roleRadios.forEach(function (radio) {
                    radio.addEventListener('change', function () {
                        if (this.value === 'captain' && this.checked) {
                            captainContainer.classList.remove('hidden');
                        } else {
                            captainContainer.classList.add('hidden');
                        }
                    });
                });
                // Initial check
                var selectedRole = document.querySelector('input[name="role"]:checked');
                if (selectedRole && selectedRole.value === 'captain') {
                    captainContainer.classList.remove('hidden');
                } else {
                    captainContainer.classList.add('hidden');
                }
            }

            // Clear signup errors on input
            ['roll-number', 'user-name', 'password', 'confirm-password', 'school-name-display', 'class-name-display', 'section-name-display'].forEach(function (id) {
                var el = document.getElementById(id);
                if (el) el.addEventListener('input', function () {
                    var fieldKey = id.replace('user-', '').replace('-number', '').replace('-display', '');
                    clearError(fieldKey, id);
                });
            });
        });

        function handleSignUp(e) {
            e.preventDefault();

            var config = Storage.get('config') || {};

            var schoolName = document.getElementById('school-name-display').value.trim();
            var classVal = document.getElementById('class-name-display').value.trim();
            var sectionVal = document.getElementById('section-name-display').value.trim();

            var rollNumber = parseInt(document.getElementById('roll-number').value, 10);
            var userName = document.getElementById('user-name').value.trim();
            var roleInput = document.querySelector('input[name="role"]:checked');
            var baseRole = roleInput ? roleInput.value : 'student';
            
            // Map the selected captain designation if captain is selected
            var role = baseRole;
            if (baseRole === 'captain') {
                var designInput = document.getElementById('captain-designation');
                if (designInput) {
                    role = designInput.value; // 'captain', 'captain_2nd', or 'captain_3rd'
                }
            }

            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;

            var hasError = false;

            if (!schoolName) { showError('school-name', 'Institution Name is required', 'school-name-display'); hasError = true; }
            if (!classVal) { showError('class-name', 'Class is required', 'class-name-display'); hasError = true; }
            if (!sectionVal) { showError('section-name', 'Section is required', 'section-name-display'); hasError = true; }

            if (isNaN(rollNumber) || rollNumber < 1) { showError('roll', 'Roll Number is required', 'roll-number'); hasError = true; }
            if (!userName) { showError('name', 'Full Name is required', 'user-name'); hasError = true; }
            if (!password) { showError('password', 'Password is required', 'password'); hasError = true; }
            if (!confirmPassword) { showError('confirm', 'Confirm Password is required', 'confirm-password'); hasError = true; }
            if (password && confirmPassword && password !== confirmPassword) { showError('confirm', 'Passwords do not match', 'confirm-password'); hasError = true; }

            // Check uniqueness of Roll Number in localStorage
            var users = Storage.get('users') || [];
            var existing = users.find(function (u) { return u.rollNumber === rollNumber; });
            if (existing) {
                showError('roll', 'Roll Number must be unique. Already registered!', 'roll-number');
                hasError = true;
            }

            if (hasError) {
                var card = document.getElementById('signup-card');
                if (card) {
                    card.classList.add('shake');
                    card.addEventListener('animationend', function () { card.classList.remove('shake'); }, { once: true });
                }
                return;
            }

            var signupBtn = document.getElementById('setup-btn');
            UI.setLoading(signupBtn, true);

            setTimeout(function () {
                var isCap = role === 'captain' || role === 'captain_2nd' || role === 'captain_3rd';
                // Save new config upon signing up
                var newConfig = {
                    schoolName: schoolName,
                    class: classVal,
                    section: sectionVal,
                    className: classVal + ' ' + sectionVal,
                    studentCount: config.studentCount || 60,
                    captainName: isCap ? userName : (config.captainName || 'Captain'),
                    theme: config.theme || 'dark',
                    setupComplete: true,
                    setupDate: new Date().toISOString()
                };
                Storage.set('config', newConfig);

                var newUser = {
                    rollNumber: rollNumber,
                    name: userName,
                    role: role,
                    password: password,
                    registeredAt: new Date().toISOString()
                };
                Storage.push('users', newUser);

                // Auto-login the user by establishing the session immediately
                var session = {
                    rollNumber: rollNumber,
                    name: userName,
                    role: role,
                    isLoggedIn: true,
                    loginTime: new Date().toISOString()
                };
                Storage.set('session', session);

                UI.toast('Account created successfully! Redirecting...', 'success');

                setTimeout(function () {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }, 600);
        }

        function showError(field, message, inputId) {
            var errorEl = document.getElementById(field + '-error');
            var inputEl = document.getElementById(inputId);

            if (errorEl) { errorEl.textContent = message; errorEl.classList.remove('hidden'); }
            if (inputEl) { inputEl.classList.add('form-input--error'); }
        }

        function clearError(field, inputId) {
            var errorEl = document.getElementById(field + '-error');
            var inputEl = document.getElementById(inputId);

            if (errorEl) { errorEl.textContent = ''; errorEl.classList.add('hidden'); }
            if (inputEl) { inputEl.classList.remove('form-input--error'); }
        }
    </script>
</body>
</html>
