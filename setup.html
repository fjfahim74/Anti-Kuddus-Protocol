<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <style>
        .setup-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            position: relative;
            overflow: hidden;
        }

        .setup-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .setup-bg__orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
        }

        .setup-bg__orb--1 {
            width: 450px;
            height: 450px;
            background: rgba(108, 99, 255, 0.18);
            top: -15%;
            left: -10%;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .setup-bg__orb--2 {
            width: 350px;
            height: 350px;
            background: rgba(0, 212, 170, 0.12);
            bottom: -10%;
            right: -10%;
            animation: orbFloat 24s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.03); }
        }

        .setup-card {
            width: 100%;
            max-width: 480px;
            padding: var(--space-10);
            animation: fadeInScale 0.5s ease;
        }

        .setup-card__header {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .setup-card__logo {
            width: 56px;
            height: 56px;
            margin: 0 auto var(--space-5);
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
            box-shadow: var(--shadow-glow-primary);
        }

        .setup-card__title {
            font-size: var(--text-2xl);
            font-weight: var(--weight-bold);
            margin-bottom: var(--space-2);
        }

        .setup-card__subtitle {
            font-size: var(--text-sm);
            color: var(--text-muted);
            line-height: var(--leading-relaxed);
        }

        .setup-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .setup-form .btn--primary {
            margin-top: var(--space-2);
            padding: var(--space-4) var(--space-6);
            font-size: var(--text-base);
        }

        .setup-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }

        .setup-divider {
            border: none;
            border-top: 1px solid var(--glass-border);
            margin: var(--space-4) 0;
        }

        .setup-section-label {
            font-size: var(--text-sm);
            color: var(--text-muted);
            text-align: center;
            margin-bottom: var(--space-2);
        }

        .setup-footer {
            text-align: center;
            margin-top: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .setup-footer a {
            color: var(--accent-primary);
            font-weight: var(--weight-medium);
        }

        .setup-footer a:hover {
            text-decoration: underline;
        }

        .setup-back {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            position: fixed;
            top: var(--space-6);
            left: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
            transition: color var(--transition-fast);
            z-index: 10;
        }

        .setup-back:hover {
            color: var(--text-primary);
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-2);
        }

        .role-option {
            position: relative;
        }

        .role-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-3);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            color: var(--text-muted);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
        }

        .role-option label:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            color: var(--text-secondary);
        }

        .role-option input:checked + label {
            background: rgba(108, 99, 255, 0.12);
            border-color: rgba(108, 99, 255, 0.4);
            color: var(--accent-primary);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease; }

        @media (max-width: 480px) {
            .setup-card { padding: var(--space-6); }
            .setup-row { grid-template-columns: 1fr; }
            .setup-back { top: var(--space-4); left: var(--space-4); }
        }
    </style>
</head>
<body>
    <a href="#setup-form" class="skip-link">Skip to form</a>

    <div class="setup-bg" aria-hidden="true">
        <div class="setup-bg__orb setup-bg__orb--1"></div>
        <div class="setup-bg__orb setup-bg__orb--2"></div>
    </div>

    <a href="index.html" class="setup-back" aria-label="Back to landing page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back
    </a>

    <main class="setup-page">
        <div class="setup-card glass-card--elevated">
            <div class="setup-card__header">
                <div class="setup-card__logo">⚡</div>
                <h1 class="setup-card__title">Create Account</h1>
                <p class="setup-card__subtitle" id="signup-subtitle">Register to access the Anti-Kuddus Protocol platform</p>
            </div>

            <form class="setup-form" id="setup-form" novalidate>
                <!-- School Config Section (hidden if config already exists) -->
                <div id="school-section">
                    <div class="form-group">
                        <label class="form-label form-label--required" for="school-name">Institute / School Name</label>
                        <input
                            type="text"
                            id="school-name"
                            class="form-input"
                            placeholder="e.g. Dhaka Model High School"
                            required
                            autocomplete="organization"
                        >
                        <span class="form-error hidden" id="school-error"></span>
                    </div>

                    <div class="setup-row">
                        <div class="form-group">
                            <label class="form-label form-label--required" for="class-name">Class / Section</label>
                            <input
                                type="text"
                                id="class-name"
                                class="form-input"
                                placeholder="e.g. 7-B"
                                required
                            >
                            <span class="form-error hidden" id="class-error"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label form-label--required" for="student-count">Total Students</label>
                            <input
                                type="number"
                                id="student-count"
                                class="form-input"
                                placeholder="e.g. 48"
                                min="5"
                                max="200"
                                required
                            >
                            <span class="form-error hidden" id="count-error"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="captain-name">1st Captain Name <span style="color: var(--text-muted); font-weight: 400;">(optional)</span></label>
                        <input
                            type="text"
                            id="captain-name"
                            class="form-input"
                            placeholder="e.g. Kuddus"
                            autocomplete="off"
                        >
                        <span class="form-hint">The person whose authority you're monitoring</span>
                    </div>

                    <hr class="setup-divider">
                </div>

                <!-- Personal Details -->
                <p class="setup-section-label">Your details</p>

                <div class="setup-row">
                    <div class="form-group">
                        <label class="form-label form-label--required" for="roll-number">Roll Number</label>
                        <input
                            type="number"
                            id="roll-number"
                            class="form-input"
                            placeholder="e.g. 1"
                            min="1"
                            max="200"
                            required
                        >
                        <span class="form-error hidden" id="roll-error"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label--required" for="user-name">Your Name</label>
                        <input
                            type="text"
                            id="user-name"
                            class="form-input"
                            placeholder="e.g. Rahim"
                            required
                        >
                        <span class="form-error hidden" id="name-error"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Your Role</label>
                    <div class="role-selector" role="radiogroup" aria-label="Select your role">
                        <div class="role-option">
                            <input type="radio" name="role" id="role-student" value="student" checked>
                            <label for="role-student">Student</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="role-captain-2" value="captain_2nd">
                            <label for="role-captain-2">2nd Captain</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="role-captain-3" value="captain_3rd">
                            <label for="role-captain-3">3rd Captain</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" name="role" id="role-cr" value="cr">
                            <label for="role-cr">Class Rep</label>
                        </div>
                    </div>
                </div>

                <!-- Password -->
                <div class="setup-row">
                    <div class="form-group">
                        <label class="form-label form-label--required" for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Create password"
                            required
                            minlength="4"
                        >
                        <span class="form-error hidden" id="password-error"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label--required" for="confirm-password">Confirm Password</label>
                        <input
                            type="password"
                            id="confirm-password"
                            class="form-input"
                            placeholder="Confirm password"
                            required
                        >
                        <span class="form-error hidden" id="confirm-error"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary btn--full btn--lg" id="setup-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
                    Sign Up
                </button>
            </form>

            <div class="setup-footer">
                <p>Already have an account? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var config = Storage.get('config');
            var hasConfig = config && config.setupComplete;

            // If config exists, hide school section (another student signing up)
            if (hasConfig) {
                document.getElementById('school-section').style.display = 'none';
                document.getElementById('signup-subtitle').textContent = config.schoolName + ' — Class ' + config.className;
                var rollInput = document.getElementById('roll-number');
                if (rollInput) rollInput.max = config.studentCount;
            }

            var form = document.getElementById('setup-form');
            form.addEventListener('submit', handleSignUp);

            // Clear errors on input
            var fields = ['school-name', 'class-name', 'student-count', 'roll-number', 'user-name', 'password', 'confirm-password'];
            fields.forEach(function (id) {
                var el = document.getElementById(id);
                if (el) el.addEventListener('input', function () {
                    var errorMap = { 'school-name': 'school', 'class-name': 'class', 'student-count': 'count', 'roll-number': 'roll', 'user-name': 'name', 'password': 'password', 'confirm-password': 'confirm' };
                    clearError(errorMap[id]);
                });
            });
        });

        function handleSignUp(e) {
            e.preventDefault();

            var config = Storage.get('config');
            var hasConfig = config && config.setupComplete;

            var schoolName, className, studentCount, captainName;

            if (hasConfig) {
                schoolName = config.schoolName;
                className = config.className;
                studentCount = config.studentCount;
                captainName = config.captainName;
            } else {
                schoolName = document.getElementById('school-name').value.trim();
                className = document.getElementById('class-name').value.trim();
                studentCount = parseInt(document.getElementById('student-count').value, 10);
                captainName = document.getElementById('captain-name').value.trim();
            }

            var rollNumber = parseInt(document.getElementById('roll-number').value, 10);
            var userName = document.getElementById('user-name').value.trim();
            var roleInput = document.querySelector('input[name="role"]:checked');
            var role = roleInput ? roleInput.value : 'student';
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;

            var hasError = false;

            // Validate school fields only if no config
            if (!hasConfig) {
                if (!schoolName) { showError('school', 'School name is required'); hasError = true; }
                if (!className) { showError('class', 'Class / Section is required'); hasError = true; }
                if (isNaN(studentCount) || studentCount < 5 || studentCount > 200) { showError('count', 'Enter a number between 5 and 200'); hasError = true; }
            }

            var maxStudents = studentCount || (config ? config.studentCount : 200);
            if (isNaN(rollNumber) || rollNumber < 1 || rollNumber > maxStudents) {
                showError('roll', 'Enter a valid roll number (1-' + maxStudents + ')');
                hasError = true;
            }

            if (!userName || userName.length < 2) { showError('name', 'Name is required (min 2 chars)'); hasError = true; }
            if (!password || password.length < 4) { showError('password', 'Min 4 characters'); hasError = true; }
            if (password !== confirmPassword) { showError('confirm', 'Passwords do not match'); hasError = true; }

            // Check if roll already registered
            var users = Storage.get('users') || [];
            var existing = users.find(function (u) { return u.rollNumber === rollNumber; });
            if (existing) {
                showError('roll', 'Roll #' + rollNumber + ' is already registered');
                hasError = true;
            }

            if (hasError) {
                var card = document.querySelector('.setup-card');
                card.classList.add('shake');
                card.addEventListener('animationend', function () { card.classList.remove('shake'); }, { once: true });
                return;
            }

            var setupBtn = document.getElementById('setup-btn');
            UI.setLoading(setupBtn, true);

            setTimeout(function () {
                // Save config if first user
                if (!hasConfig) {
                    var newConfig = {
                        schoolName: schoolName,
                        className: className,
                        studentCount: studentCount,
                        captainName: captainName || 'Captain',
                        theme: 'dark',
                        soundEnabled: true,
                        setupComplete: true,
                        setupDate: new Date().toISOString()
                    };
                    Storage.set('config', newConfig);
                }

                // Save user to users array
                var newUser = {
                    rollNumber: rollNumber,
                    name: userName,
                    role: role,
                    password: password,
                    registeredAt: new Date().toISOString()
                };
                Storage.push('users', newUser);

                // Create session
                var session = {
                    rollNumber: rollNumber,
                    name: userName,
                    role: role,
                    isLoggedIn: true,
                    loginTime: new Date().toISOString()
                };
                Storage.set('session', session);

                UI.toast('Welcome, ' + userName + '!', 'success');

                setTimeout(function () {
                    window.location.href = 'dashboard.html';
                }, 500);
            }, 600);
        }

        function showError(field, message) {
            var errorEl = document.getElementById(field + '-error');
            var inputMap = { school: 'school-name', class: 'class-name', count: 'student-count', roll: 'roll-number', name: 'user-name', password: 'password', confirm: 'confirm-password' };
            var inputEl = document.getElementById(inputMap[field]);

            if (errorEl) { errorEl.textContent = message; errorEl.classList.remove('hidden'); }
            if (inputEl) { inputEl.classList.add('form-input--error'); }
        }

        function clearError(field) {
            var errorEl = document.getElementById(field + '-error');
            var inputMap = { school: 'school-name', class: 'class-name', count: 'student-count', roll: 'roll-number', name: 'user-name', password: 'password', confirm: 'confirm-password' };
            var inputEl = document.getElementById(inputMap[field]);

            if (errorEl) { errorEl.textContent = ''; errorEl.classList.add('hidden'); }
            if (inputEl) { inputEl.classList.remove('form-input--error'); }
        }
    </script>
</body>
</html>
