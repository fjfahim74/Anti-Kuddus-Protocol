<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Rescue — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/pages/sos.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <!-- Navbar -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <a href="../index.html" class="navbar__logo" aria-label="Anti-Kuddus Protocol Home">
            <div class="navbar__logo-icon">
                <svg class="logo-icon-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logo-grad-sos" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <path d="M16 2L28 8V20L16 30L4 20V8L16 2Z" class="logo-icon-shield" stroke="url(#logo-grad-sos)" stroke-width="2" stroke-linejoin="round" fill="rgba(99, 102, 241, 0.05)" />
                    <path d="M17 7L10 15H16L15 25L22 14H16L17 7Z" class="logo-icon-lightning" fill="url(#logo-grad-sos)" />
                </svg>
            </div>
            <span class="logo-brand">A<span class="logo-brand-accent">K</span>P</span>
        </a>
        <div class="navbar__actions">
            <div class="navbar__user">
                <span class="navbar__name"></span>
                <div class="navbar__avatar"></div>
            </div>
            <button class="btn btn--ghost btn--sm navbar__logout" aria-label="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </nav>

    <main id="main" class="page">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header animate-in">
                <a href="../dashboard.html" class="page-header__back" aria-label="Back to dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <div class="page-header__info">
                    <h1 class="page-header__title">SOS Rescue</h1>
                    <p class="page-header__subtitle">Emergency alert system for immediate help</p>
                </div>
            </div>

            <!-- SOS Layout -->
            <div class="sos-layout">
                <!-- Panic Section -->
                <div class="sos-panic-section animate-in">
                    <div class="glass-card sos-panic-card">
                        <div class="sos-panic-card__header">
                            <h2>Emergency Alert</h2>
                            <p>Press the button to send an SOS alert to class captains</p>
                        </div>

                        <div class="sos-panic-wrapper">
                            <div class="sos-panic-ring sos-panic-ring--1"></div>
                            <div class="sos-panic-ring sos-panic-ring--2"></div>
                            <div class="sos-panic-ring sos-panic-ring--3"></div>
                            <button class="sos-panic-btn" id="sos-panic-btn" aria-label="Trigger SOS alert">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                <span>SOS</span>
                            </button>
                        </div>

                        <div class="sos-location-select">
                            <label class="form-label" for="sos-location">Your Location</label>
                            <select id="sos-location" class="form-input">
                                <option value="classroom">Classroom</option>
                                <option value="corridor">Corridor</option>
                                <option value="playground">Playground</option>
                                <option value="canteen">Canteen</option>
                                <option value="washroom">Washroom Area</option>
                                <option value="library">Library</option>
                                <option value="lab">Lab</option>
                                <option value="stairs">Staircase</option>
                                <option value="gate">School Gate</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="sos-status" id="sos-status" style="display: none;">
                            <div class="sos-status__icon pulse-danger">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                            </div>
                            <span id="sos-status-text">Alert sent! Help is on the way.</span>
                        </div>
                    </div>
                </div>

                <!-- Alerts Section -->
                <div class="sos-alerts-section animate-in">
                    <!-- Active Alerts -->
                    <div class="glass-card sos-alerts-card">
                        <div class="sos-alerts-card__header">
                            <h3>Active Alerts <span class="badge badge--danger" id="active-count">0</span></h3>
                        </div>
                        <div class="sos-alerts-list" id="active-alerts">
                            <div class="empty-state" style="padding: var(--space-6) var(--space-4);">
                                <p class="empty-state__text">No active alerts. All clear!</p>
                            </div>
                        </div>
                    </div>

                    <!-- Resolved Alerts -->
                    <div class="glass-card sos-alerts-card">
                        <div class="sos-alerts-card__header">
                            <h3>Resolved <span class="text-muted" id="resolved-count">(0)</span></h3>
                            <button class="btn btn--ghost btn--sm" id="clear-resolved-btn">Clear</button>
                        </div>
                        <div class="sos-alerts-list sos-alerts-list--resolved" id="resolved-alerts">
                            <div class="empty-state" style="padding: var(--space-6) var(--space-4);">
                                <p class="empty-state__text">No resolved alerts yet.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/modules/sos.js"></script>
</body>
</html>
