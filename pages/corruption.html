<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corruption Ledger — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/pages/corruption.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <!-- Navbar -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <a href="../index.html" class="navbar__logo" aria-label="Anti-Kuddus Protocol Home">
            <div class="navbar__logo-icon">
                <svg class="logo-icon-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logo-grad-corruption" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <path d="M16 2L28 8V20L16 30L4 20V8L16 2Z" class="logo-icon-shield" stroke="url(#logo-grad-corruption)" stroke-width="2" stroke-linejoin="round" fill="rgba(99, 102, 241, 0.05)" />
                    <path d="M17 7L10 15H16L15 25L22 14H16L17 7Z" class="logo-icon-lightning" fill="url(#logo-grad-corruption)" />
                </svg>
            </div>
            <span class="logo-brand">A<span class="logo-brand-accent">K</span>P</span>
        </a>
        <div class="navbar__actions">
            <div class="navbar__user">
                <span class="navbar__name"></span>
                <div class="navbar__avatar"></div>
            </div>
            <button class="btn btn--ghost btn--sm navbar__logout" aria-label="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </nav>

    <main id="main" class="page">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header animate-in">
                <a href="../dashboard.html" class="page-header__back" aria-label="Back to dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <div class="page-header__info">
                    <h1 class="page-header__title">Corruption Ledger</h1>
                    <p class="page-header__subtitle">Track and expose misuse of power</p>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="corruption-stats animate-in">
                <div class="stat-card">
                    <div class="stat-card__value" id="stat-total">0</div>
                    <div class="stat-card__label">Total Entries</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card__value" id="stat-accused">0</div>
                    <div class="stat-card__label">Accused</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card__value" id="stat-week">0</div>
                    <div class="stat-card__label">This Week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card__value" id="stat-top-cat">—</div>
                    <div class="stat-card__label">Top Category</div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs animate-in">
                <button class="tabs__btn tabs__btn--active" data-tab="log">Log Entry</button>
                <button class="tabs__btn" data-tab="records">Records</button>
                <button class="tabs__btn" data-tab="charts">Charts</button>
            </div>

            <!-- Tab: Log Entry -->
            <section class="tab-panel tab-panel--active" id="tab-log">
                <div class="glass-card corruption-form-card">
                    <h3 class="corruption-form-card__title">Report Corruption</h3>

                    <form id="corruption-form" class="corruption-form" novalidate>
                        <div class="form-group">
                            <label class="form-label form-label--required" for="corruption-item">What happened?</label>
                            <textarea
                                id="corruption-item"
                                class="form-input"
                                rows="3"
                                placeholder="Describe the corrupt act or misuse of power..."
                                required
                                maxlength="500"
                            ></textarea>
                            <span class="form-hint"><span id="item-char-count">0</span>/500</span>
                            <span class="form-error hidden" id="item-error"></span>
                        </div>

                        <div class="corruption-form__row">
                            <div class="form-group">
                                <label class="form-label form-label--required" for="corruption-accused">Accused (Roll #)</label>
                                <input
                                    type="number"
                                    id="corruption-accused"
                                    class="form-input"
                                    placeholder="Roll number"
                                    min="1"
                                    required
                                >
                                <span class="form-error hidden" id="accused-error"></span>
                            </div>

                            <div class="form-group">
                                <label class="form-label form-label--required" for="corruption-category">Category</label>
                                <select id="corruption-category" class="form-input" required>
                                    <option value="">Select category</option>
                                    <option value="bribery">Bribery / Extortion</option>
                                    <option value="favoritism">Favoritism</option>
                                    <option value="abuse_power">Abuse of Power</option>
                                    <option value="theft">Theft / Misuse of Funds</option>
                                    <option value="intimidation">Intimidation</option>
                                    <option value="false_reporting">False Reporting</option>
                                    <option value="nepotism">Nepotism</option>
                                    <option value="other">Other</option>
                                </select>
                                <span class="form-error hidden" id="category-error"></span>
                            </div>
                        </div>

                        <div class="corruption-form__row">
                            <div class="form-group">
                                <label class="form-label" for="corruption-date">Date of Incident</label>
                                <input type="date" id="corruption-date" class="form-input">
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="corruption-evidence">Evidence</label>
                                <input
                                    type="text"
                                    id="corruption-evidence"
                                    class="form-input"
                                    placeholder="Witnesses, proof, etc."
                                >
                            </div>
                        </div>

                        <button type="submit" class="btn btn--primary btn--full btn--lg" id="corruption-submit-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                            Log Entry
                        </button>
                    </form>
                </div>
            </section>

            <!-- Tab: Records -->
            <section class="tab-panel" id="tab-records">
                <div class="corruption-toolbar glass-card--static">
                    <div class="corruption-toolbar__filters">
                        <select id="filter-category" class="form-input form-input--sm">
                            <option value="all">All Categories</option>
                            <option value="bribery">Bribery</option>
                            <option value="favoritism">Favoritism</option>
                            <option value="abuse_power">Abuse of Power</option>
                            <option value="theft">Theft</option>
                            <option value="intimidation">Intimidation</option>
                            <option value="false_reporting">False Reporting</option>
                            <option value="nepotism">Nepotism</option>
                            <option value="other">Other</option>
                        </select>
                        <select id="filter-sort" class="form-input form-input--sm">
                            <option value="newest">Newest First</option>
                            <option value="oldest">Oldest First</option>
                            <option value="accused">By Accused</option>
                        </select>
                    </div>
                    <button class="btn btn--danger btn--sm" id="clear-all-records">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                        Clear All
                    </button>
                </div>

                <div class="corruption-records" id="corruption-records">
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <p class="empty-state__text">No corruption entries logged yet.</p>
                    </div>
                </div>
            </section>

            <!-- Tab: Charts -->
            <section class="tab-panel" id="tab-charts">
                <div class="charts-grid">
                    <div class="glass-card chart-card">
                        <h3 class="chart-card__title">By Category</h3>
                        <div class="chart-bars" id="chart-category"></div>
                    </div>
                    <div class="glass-card chart-card">
                        <h3 class="chart-card__title">Top Accused</h3>
                        <div class="chart-bars" id="chart-accused"></div>
                    </div>
                    <div class="glass-card chart-card chart-card--full">
                        <h3 class="chart-card__title">Timeline (Last 7 Days)</h3>
                        <div class="chart-timeline" id="chart-timeline"></div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/modules/corruption.js"></script>
</body>
</html>
