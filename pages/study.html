<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Assistant — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/pages/study.css">

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236c63ff'/%3E%3Cstop offset='1' stop-color='%2300d4aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cpath d='M50 10L21 23V47C21 68 33 85 50 92C67 85 79 68 79 47V23L50 10Z' fill='white'/%3E%3Cpath d='M35 49L45 59L66 36' stroke='%236c63ff' stroke-width='9' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <!-- Navbar -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <a href="../dashboard.html" class="navbar__logo" aria-label="Dashboard">
            <div class="navbar__logo-icon"><svg viewBox="0 0 24 24" width="60%" height="60%" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.5L4.5 5.5V11C4.5 15.8 7.6 20.2 12 21.5C16.4 20.2 19.5 15.8 19.5 11V5.5L12 2.5Z" fill="white"/><path d="M8.5 12L10.8 14.3L15.5 9.2" stroke="#6c63ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
            <span>AKP</span>
        </a>
        <div class="navbar__actions">
            <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode"></button>
            <div class="navbar__user" role="button" tabindex="0" aria-label="Open profile and settings">
                <span class="navbar__name"></span>
                <div class="navbar__avatar"></div>
            </div>
            <button class="btn btn--ghost btn--sm navbar__logout" aria-label="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </nav>

    <main id="main" class="page">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header animate-in">
                <a href="../dashboard.html" class="page-header__back" aria-label="Back to dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <div class="page-header__info">
                    <h1 class="page-header__title">AI Study Assistant</h1>
                    <p class="page-header__subtitle">Get AI-powered syllabus summaries with Google Gemini</p>
                </div>
            </div>

            <!-- Main Layout -->
            <div class="study-layout">
                <!-- Input Panel -->
                <div class="study-input-panel">
                    <div class="glass-card study-input-card">
                        <div class="study-input-card__header">
                            <h3>Paste Your Syllabus</h3>
                            <button class="btn btn--ghost btn--sm" id="clear-input-btn" aria-label="Clear input">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                                Clear
                            </button>
                        </div>

                        <textarea id="syllabus-input" class="form-input study-textarea" rows="10" placeholder="Paste your syllabus content, chapter text, or study material here...

Example:
Chapter 5: Photosynthesis
Photosynthesis is the process by which green plants use sunlight to synthesize food from carbon dioxide and water..."></textarea>

                        <div class="study-options">
                            <div class="form-group">
                                <label class="form-label" for="summary-type">Summary Type</label>
                                <select id="summary-type" class="form-input">
                                    <option value="bullet">Bullet Points</option>
                                    <option value="brief">Brief Summary</option>
                                    <option value="detailed">Detailed Notes</option>
                                    <option value="qa">Q&A Format</option>
                                    <option value="explain">Explain Like I'm 12</option>
                                </select>
                            </div>

                            <button class="btn btn--primary btn--lg btn--full" id="generate-summary-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                                Generate Summary
                            </button>
                        </div>
                    </div>

                <!-- Output Panel -->
                <div class="study-output-panel">
                    <div class="glass-card study-output-card">
                        <div class="study-output-card__header">
                            <h3>AI Summary</h3>
                            <div class="study-output-card__actions" id="output-actions" style="display: none;">
                                <button class="btn btn--ghost btn--sm" id="copy-output-btn" data-tooltip="Copy to clipboard">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                                    Copy
                                </button>
                            </div>
                        </div>

                        <div class="study-output" id="study-output">
                            <div class="study-output__empty">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>
                                <p>Paste your syllabus and click <strong>Generate Summary</strong> to see AI-generated notes here.</p>
                            </div>
                        </div>
                    </div>

                    <!-- History -->
                    <div class="glass-card study-history-card">
                        <div class="study-history-card__header">
                            <h3>History <span class="text-muted" id="history-count">(0)</span></h3>
                            <button class="btn btn--ghost btn--sm" id="clear-history-btn">Clear All</button>
                        </div>
                        <div class="study-history" id="study-history">
                            <div class="empty-state" style="padding: var(--space-6) var(--space-4);">
                                <p class="empty-state__text">No summaries generated yet.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/modules/study.js"></script>
</body>
</html>
