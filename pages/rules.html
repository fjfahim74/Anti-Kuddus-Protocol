<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rule Checker — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/pages/rules.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <a href="#main" class="skip-link">Skip to content</a>

    <!-- Navbar -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <a href="../index.html" class="navbar__logo" aria-label="Anti-Kuddus Protocol Home">
            <div class="navbar__logo-icon">
                <svg class="logo-icon-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="logo-grad-rules" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <path d="M16 2L28 8V20L16 30L4 20V8L16 2Z" class="logo-icon-shield" stroke="url(#logo-grad-rules)" stroke-width="2" stroke-linejoin="round" fill="rgba(99, 102, 241, 0.05)" />
                    <path d="M17 7L10 15H16L15 25L22 14H16L17 7Z" class="logo-icon-lightning" fill="url(#logo-grad-rules)" />
                </svg>
            </div>
            <span class="logo-brand">A<span class="logo-brand-accent">K</span>P</span>
        </a>
        <div class="navbar__actions">
            <div class="navbar__user">
                <span class="navbar__name"></span>
                <div class="navbar__avatar"></div>
            </div>
            <button class="btn btn--ghost btn--sm navbar__logout" aria-label="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </nav>

    <main id="main" class="page">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header animate-in">
                <a href="../dashboard.html" class="page-header__back" aria-label="Back to dashboard">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </a>
                <div class="page-header__info">
                    <h1 class="page-header__title">Rule Checker</h1>
                    <p class="page-header__subtitle">Search and verify classroom rules instantly</p>
                </div>
            </div>

            <!-- Search Section -->
            <div class="rules-search-section animate-in">
                <div class="glass-card rules-search-card">
                    <div class="rules-search-wrapper">
                        <div class="rules-search-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        </div>
                        <input
                            type="text"
                            id="rules-search"
                            class="rules-search-input"
                            placeholder="Ask a question... e.g. 'Can captain collect money?'"
                            autocomplete="off"
                            aria-label="Search rules"
                        >
                        <button class="btn btn--ghost btn--sm rules-search-clear" id="search-clear" style="display: none;" aria-label="Clear search">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                    <p class="rules-search-hint">Try: "phone", "uniform", "homework", "bully", "captain authority"</p>
                </div>
            </div>

            <!-- Verdict Section -->
            <div class="rules-verdict animate-in" id="rules-verdict" style="display: none;"></div>

            <!-- Rules List -->
            <div class="rules-results animate-in">
                <div class="rules-results__header">
                    <h3>All Rules <span class="text-muted" id="rules-count">(0)</span></h3>
                    <div class="rules-results__filters">
                        <select id="filter-category" class="form-input form-input--sm">
                            <option value="all">All Categories</option>
                            <option value="discipline">Discipline</option>
                            <option value="attendance">Attendance</option>
                            <option value="academic">Academic</option>
                            <option value="governance">Governance</option>
                            <option value="conduct">Conduct</option>
                            <option value="uniform">Uniform</option>
                            <option value="supplies">Supplies</option>
                        </select>
                    </div>
                </div>
                <div class="rules-list" id="rules-list"></div>
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/modules/rules.js"></script>
</body>
</html>
