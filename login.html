<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236c63ff'/%3E%3Cstop offset='1' stop-color='%2300d4aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cpath d='M50 10L21 23V47C21 68 33 85 50 92C67 85 79 68 79 47V23L50 10Z' fill='white'/%3E%3Cpath d='M35 49L45 59L66 36' stroke='%236c63ff' stroke-width='9' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            position: relative;
            overflow: hidden;
        }

        /* Background orbs */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .login-bg__orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
        }

        .login-bg__orb--1 {
            width: 400px;
            height: 400px;
            background: rgba(108, 99, 255, 0.2);
            top: -15%;
            right: -10%;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .login-bg__orb--2 {
            width: 350px;
            height: 350px;
            background: rgba(0, 212, 170, 0.12);
            bottom: -10%;
            left: -10%;
            animation: orbFloat 24s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.03); }
        }

        /* Split auth shell: form + 3D visual panel */
        .auth-shell {
            display: flex;
            align-items: stretch;
            width: 100%;
            max-width: 1080px;
            min-height: 620px;
            border-radius: var(--radius-2xl, 28px);
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: var(--bg-secondary);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            animation: fadeInScale 0.5s ease;
        }

        .auth-shell__visual {
            flex: 1 1 46%;
            position: relative;
            min-width: 320px;
            background:
                radial-gradient(circle at 25% 20%, rgba(108, 99, 255, 0.16), transparent 55%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 170, 0.1), transparent 50%),
                #05050a;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        [data-theme="light"] .auth-shell__visual {
            background:
                radial-gradient(circle at 25% 20%, rgba(108, 99, 255, 0.10), transparent 55%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 170, 0.08), transparent 50%),
                #eef0f6;
        }

        .auth-shell__visual canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            /* Nudge the rendered scene rightward and clip the corner where
               the Spline watermark renders; overflow: hidden on the panel
               keeps it fully contained. */
            transform: scale(1.18) translateX(7%);
            transform-origin: center;
        }

        /* Hide the Spline watermark badge, wherever it gets injected */
        .auth-shell__visual a[href*="spline.design"] {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Safety net: mask the corner directly in case the watermark is
           baked into the canvas pixels rather than a real DOM link. */
        .auth-shell__visual-watermark-mask {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 45%;
            height: 15%;
            min-height: 56px;
            background: radial-gradient(circle at 100% 100%, #05050a 40%, rgba(5, 5, 10, 0.85) 65%, rgba(5, 5, 10, 0) 100%);
            z-index: 3;
            pointer-events: none;
            transition: background-color 0.3s ease;
        }

        [data-theme="light"] .auth-shell__visual-watermark-mask {
            background: radial-gradient(circle at 100% 100%, #eef0f6 40%, rgba(238, 240, 246, 0.85) 65%, rgba(238, 240, 246, 0) 100%);
        }

        .auth-shell__visual-badge {
            position: absolute;
            left: 18px;
            bottom: 18px;
            z-index: 2;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(10, 10, 15, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-size: 11px;
            letter-spacing: 0.01em;
            color: rgba(255, 255, 255, 0.85);
        }

        [data-theme="light"] .auth-shell__visual-badge {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(20, 20, 30, 0.12);
            color: rgba(20, 20, 30, 0.75);
        }

        .auth-shell__visual-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00d4aa;
            box-shadow: 0 0 8px #00d4aa;
        }

        /* Login card */
        .login-card {
            flex: 1 1 54%;
            width: 100%;
            max-width: 460px;
            padding: var(--space-10);
        }

        .login-card__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .login-card__brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        .login-card__brand-name {
            font-family: var(--font-heading);
            font-weight: var(--weight-bold);
            font-size: var(--text-base);
            line-height: 1.2;
        }

        .login-card__brand-tag {
            font-size: 10px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .login-card__pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .login-card__pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00d4aa;
            box-shadow: 0 0 6px #00d4aa;
        }

        .login-card__title-row {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-bottom: var(--space-8);
        }

        .login-card__logo {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
            box-shadow: var(--shadow-glow-primary);
        }

        .login-card__title {
            font-size: var(--text-2xl);
            font-weight: var(--weight-bold);
            margin-bottom: var(--space-2);
        }

        .login-card__subtitle {
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .login-form .btn--primary {
            margin-top: var(--space-2);
            padding: var(--space-4) var(--space-6);
            font-size: var(--text-base);
        }

        /* Role selector */
        .role-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-2);
        }

        .role-option {
            position: relative;
        }

        .role-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-3);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            color: var(--text-muted);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
            text-align: center;
        }

        .role-option label:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            color: var(--text-secondary);
        }

        .role-option input:checked + label {
            background: rgba(108, 99, 255, 0.12);
            border-color: rgba(108, 99, 255, 0.4);
            color: var(--accent-primary);
            box-shadow: 0 0 0 1px rgba(108, 99, 255, 0.2);
        }

        .role-option input:focus-visible + label {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
        }

        /* Back link */
        .login-back {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            position: fixed;
            top: var(--space-6);
            left: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
            transition: color var(--transition-fast);
            z-index: 10;
        }

        .login-back:hover {
            color: var(--text-primary);
        }

        /* Error shake */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: var(--space-6);
            font-size: var(--text-xs);
            color: var(--text-muted);
        }

        .login-signup-link {
            text-align: center;
            margin-top: var(--space-5);
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .login-signup-link a {
            color: var(--accent-primary);
            font-weight: var(--weight-medium);
            text-decoration: none;
        }

        .login-signup-link a:hover {
            text-decoration: underline;
        }

        .login-clear-data {
            display: block;
            width: 100%;
            margin-top: var(--space-3);
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: var(--text-xs);
            text-align: center;
            cursor: pointer;
            padding: var(--space-2);
            transition: color var(--transition-fast);
        }

        .login-clear-data:hover {
            color: var(--accent-danger);
        }

        @media (max-width: 900px) {
            .auth-shell__visual {
                display: none;
            }

            .auth-shell {
                max-width: 460px;
                min-height: 0;
            }

            .login-card {
                max-width: none;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: var(--space-6);
            }

            .login-card__header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .role-selector {
                grid-template-columns: 1fr;
            }

            .login-back {
                top: var(--space-4);
                left: var(--space-4);
            }
        }
    </style>
</head>
<body>
    <a href="#login-form" class="skip-link">Skip to login form</a>

    <button type="button" class="theme-toggle theme-toggle--floating" id="theme-toggle" aria-label="Toggle dark/light mode"></button>

    <!-- Background -->
    <div class="login-bg" aria-hidden="true">
        <div class="login-bg__orb login-bg__orb--1"></div>
        <div class="login-bg__orb login-bg__orb--2"></div>
    </div>

    <!-- Back Link -->
    <a href="index.html" class="login-back" aria-label="Back to landing page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back
    </a>

    <!-- Login Shell -->
    <main class="login-page">
        <div class="auth-shell glass-card--elevated">
            <div class="login-card">
                <div class="login-card__header">
                    <div class="login-card__brand">
                        <div class="login-card__logo"><svg viewBox="0 0 24 24" width="60%" height="60%" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.5L4.5 5.5V11C4.5 15.8 7.6 20.2 12 21.5C16.4 20.2 19.5 15.8 19.5 11V5.5L12 2.5Z" fill="white"/><path d="M8.5 12L10.8 14.3L15.5 9.2" stroke="#6c63ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
                        <div>
                            <div class="login-card__brand-name">Anti-Kuddus Protocol</div>
                            <div class="login-card__brand-tag">Class Operating System</div>
                        </div>
                    </div>
                    <div class="login-card__pill"><span class="dot"></span> Anonymous Session</div>
                </div>

                <h1 class="login-card__title" id="login-subtitle-title">Welcome Back</h1>
                <p class="login-card__subtitle" id="login-subtitle" style="margin-bottom: var(--space-8);">Enter your details to access the platform</p>

                <form class="login-form" id="login-form" novalidate>
                    <div class="form-group">
                        <label class="form-label form-label--required" for="roll-number">Roll Number</label>
                        <input
                            type="number"
                            id="roll-number"
                            class="form-input"
                            placeholder="Enter your roll number"
                            min="1"
                            max="200"
                            required
                            autocomplete="off"
                            aria-describedby="roll-hint"
                        >
                        <span class="form-hint" id="roll-hint">Your class roll number</span>
                        <span class="form-error hidden" id="roll-error"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label--required" for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            class="form-input"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                        >
                        <span class="form-error hidden" id="password-error"></span>
                    </div>

                    <button type="submit" class="btn btn--primary btn--full btn--lg" id="login-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                        Sign In
                    </button>
                </form>

                <div class="login-signup-link">
                    Don't have an account? <a href="setup.html">Sign up</a>
                </div>

                <button type="button" class="login-clear-data" id="clear-data-btn">Clear Data</button>

                <div class="login-footer">
                    <p>Your identity remains anonymous for all complaints</p>
                </div>
            </div>

            <div class="auth-shell__visual" aria-hidden="true">
                <canvas id="canvas3d"></canvas>
                <div class="auth-shell__visual-watermark-mask"></div>
                <div class="auth-shell__visual-badge"><span class="dot"></span> Interactive Workspace Ecosystem</div>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script type="module">
        import { Application } from 'https://cdn.jsdelivr.net/npm/@splinetool/runtime/+esm';

        const canvas = document.getElementById('canvas3d');
        if (canvas) {
            const app = new Application(canvas);

            function splineBgFor(theme) {
                return theme === 'light' ? '#eef0f6' : '#05050a';
            }

            app.load('https://prod.spline.design/N1COK7UWps1EnDa0/scene.splinecode').then(function () {
                var theme = document.documentElement.getAttribute('data-theme') || 'dark';
                app.setBackgroundColor(splineBgFor(theme));
            }).catch(function () {
                canvas.closest('.auth-shell__visual').style.display = 'none';
            });

            document.addEventListener('themechange', function (e) {
                var theme = (e.detail && e.detail.theme) || document.documentElement.getAttribute('data-theme') || 'dark';
                app.setBackgroundColor(splineBgFor(theme));
            });
        }
    </script>
</body>
</html>
