<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236c63ff'/%3E%3Cstop offset='1' stop-color='%2300d4aa'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cpath d='M50 10L21 23V47C21 68 33 85 50 92C67 85 79 68 79 47V23L50 10Z' fill='white'/%3E%3Cpath d='M35 49L45 59L66 36' stroke='%236c63ff' stroke-width='9' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            position: relative;
            overflow: hidden;
        }

        /* Background orbs */
        .login-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .login-bg__orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
        }

        .login-bg__orb--1 {
            width: 400px;
            height: 400px;
            background: rgba(108, 99, 255, 0.2);
            top: -15%;
            right: -10%;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .login-bg__orb--2 {
            width: 350px;
            height: 350px;
            background: rgba(0, 212, 170, 0.12);
            bottom: -10%;
            left: -10%;
            animation: orbFloat 24s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.03); }
        }

        /* Login card */
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: var(--space-10);
            animation: fadeInScale 0.5s ease;
        }

        .login-card__header {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .login-card__logo {
            width: 56px;
            height: 56px;
            margin: 0 auto var(--space-5);
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
            box-shadow: var(--shadow-glow-primary);
        }

        .login-card__title {
            font-size: var(--text-2xl);
            font-weight: var(--weight-bold);
            margin-bottom: var(--space-2);
        }

        .login-card__subtitle {
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .login-form .btn--primary {
            margin-top: var(--space-2);
            padding: var(--space-4) var(--space-6);
            font-size: var(--text-base);
        }

        /* Role selector */
        .role-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-2);
        }

        .role-option {
            position: relative;
        }

        .role-option input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .role-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-3);
            font-size: var(--text-sm);
            font-weight: var(--weight-medium);
            color: var(--text-muted);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-base);
            text-align: center;
        }

        .role-option label:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            color: var(--text-secondary);
        }

        .role-option input:checked + label {
            background: rgba(108, 99, 255, 0.12);
            border-color: rgba(108, 99, 255, 0.4);
            color: var(--accent-primary);
            box-shadow: 0 0 0 1px rgba(108, 99, 255, 0.2);
        }

        .role-option input:focus-visible + label {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
        }

        /* Back link */
        .login-back {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            position: fixed;
            top: var(--space-6);
            left: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
            transition: color var(--transition-fast);
            z-index: 10;
        }

        .login-back:hover {
            color: var(--text-primary);
        }

        /* Error shake */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .shake {
            animation: shake 0.4s ease;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: var(--space-6);
            font-size: var(--text-xs);
            color: var(--text-muted);
        }

        .login-signup-link {
            text-align: center;
            margin-top: var(--space-5);
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .login-signup-link a {
            color: var(--accent-primary);
            font-weight: var(--weight-medium);
            text-decoration: none;
        }

        .login-signup-link a:hover {
            text-decoration: underline;
        }

        .login-clear-data {
            display: block;
            width: 100%;
            margin-top: var(--space-3);
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: var(--text-xs);
            text-align: center;
            cursor: pointer;
            padding: var(--space-2);
            transition: color var(--transition-fast);
        }

        .login-clear-data:hover {
            color: var(--accent-danger);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: var(--space-6);
            }

            .role-selector {
                grid-template-columns: 1fr;
            }

            .login-back {
                top: var(--space-4);
                left: var(--space-4);
            }
        }
    </style>
</head>
<body>
    <a href="#login-form" class="skip-link">Skip to login form</a>

    <!-- Background -->
    <div class="login-bg" aria-hidden="true">
        <div class="login-bg__orb login-bg__orb--1"></div>
        <div class="login-bg__orb login-bg__orb--2"></div>
    </div>

    <!-- Back Link -->
    <a href="index.html" class="login-back" aria-label="Back to landing page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back
    </a>

    <!-- Login Card -->
    <main class="login-page">
        <div class="login-card glass-card--elevated">
            <div class="login-card__header">
                <div class="login-card__logo"><svg viewBox="0 0 24 24" width="60%" height="60%" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.5L4.5 5.5V11C4.5 15.8 7.6 20.2 12 21.5C16.4 20.2 19.5 15.8 19.5 11V5.5L12 2.5Z" fill="white"/><path d="M8.5 12L10.8 14.3L15.5 9.2" stroke="#6c63ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>
                <h1 class="login-card__title">Welcome Back</h1>
                <p class="login-card__subtitle" id="login-subtitle">Enter your details to access the platform</p>
            </div>

            <form class="login-form" id="login-form" novalidate>
                <div class="form-group">
                    <label class="form-label form-label--required" for="roll-number">Roll Number</label>
                    <input
                        type="number"
                        id="roll-number"
                        class="form-input"
                        placeholder="Enter your roll number"
                        min="1"
                        max="200"
                        required
                        autocomplete="off"
                        aria-describedby="roll-hint"
                    >
                    <span class="form-hint" id="roll-hint">Your class roll number</span>
                    <span class="form-error hidden" id="roll-error"></span>
                </div>

                <div class="form-group">
                    <label class="form-label form-label--required" for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                    <span class="form-error hidden" id="password-error"></span>
                </div>

                <button type="submit" class="btn btn--primary btn--full btn--lg" id="login-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign In
                </button>
            </form>

            <div class="login-signup-link">
                Don't have an account? <a href="setup.html">Sign up</a>
            </div>

            <button type="button" class="login-clear-data" id="clear-data-btn">Clear Data</button>

            <div class="login-footer">
                <p>Your identity remains anonymous for all complaints</p>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
