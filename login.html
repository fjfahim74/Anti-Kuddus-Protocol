<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Anti-Kuddus Protocol</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            position: relative;
            overflow: hidden;
        }

        .login-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .login-bg__orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
        }

        .login-bg__orb--1 {
            width: 400px;
            height: 400px;
            background: rgba(var(--accent-primary-rgb), 0.2);
            top: -15%;
            right: -10%;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .login-bg__orb--2 {
            width: 350px;
            height: 350px;
            background: rgba(0, 212, 170, 0.12);
            bottom: -10%;
            left: -10%;
            animation: orbFloat 24s ease-in-out infinite reverse;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(40px, 30px) scale(1.03); }
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: var(--space-10);
            animation: fadeInScale 0.5s ease;
        }

        .login-card__header {
            text-align: center;
            margin-bottom: var(--space-8);
        }

        .login-card__logo {
            width: 56px;
            height: 56px;
            margin: 0 auto var(--space-5);
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-2xl);
            box-shadow: var(--shadow-glow-primary);
            transition: all 0.3s ease;
        }

        .login-card__logo--brand {
            background: rgba(99, 102, 241, 0.08);
            border: 1.5px solid rgba(99, 102, 241, 0.25);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }

        .login-card__title {
            font-size: var(--text-2xl);
            font-weight: var(--weight-bold);
            margin-bottom: var(--space-2);
        }

        .login-card__subtitle {
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .login-form .btn--primary {
            margin-top: var(--space-2);
            padding: var(--space-4) var(--space-6);
            font-size: var(--text-base);
        }

        .login-back {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            position: fixed;
            top: var(--space-6);
            left: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
            transition: color var(--transition-fast);
            z-index: 10;
        }

        .login-back:hover {
            color: var(--text-primary);
        }

        .login-footer {
            text-align: center;
            margin-top: var(--space-6);
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .login-footer a {
            color: var(--accent-primary);
            font-weight: var(--weight-medium);
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .login-error {
            padding: var(--space-3) var(--space-4);
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-md);
            color: var(--accent-danger);
            font-size: var(--text-sm);
            text-align: center;
            display: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease; }

        @media (max-width: 480px) {
            .login-card { padding: var(--space-6); }
            .login-back { top: var(--space-4); left: var(--space-4); }
        }
    </style>
</head>
<body>
    <a href="#login-form" class="skip-link">Skip to login form</a>

    <div class="login-bg" aria-hidden="true">
        <div class="login-bg__orb login-bg__orb--1"></div>
        <div class="login-bg__orb login-bg__orb--2"></div>
    </div>

    <a href="index.html" class="login-back" aria-label="Back to landing page">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back
    </a>

    <main class="login-page">
        <!-- Institution Setup Screen Card -->
        <div class="login-card glass-card--elevated hidden" id="inst-setup-card">
            <div class="login-card__header">
                <div class="login-card__logo">🏫</div>
                <h1 class="login-card__title">Institution Setup</h1>
                <p class="login-card__subtitle">Configure your active institution to begin</p>
            </div>

            <form class="login-form" id="inst-setup-form" novalidate style="display: flex; flex-direction: column; gap: var(--space-5);">
                <div class="login-error hidden" id="inst-setup-error"></div>

                <div class="form-group">
                    <label class="form-label form-label--required" for="setup-school-name">Institution Name</label>
                    <input
                        type="text"
                        id="setup-school-name"
                        class="form-input"
                        placeholder="e.g. Dhaka High School"
                        required
                        autocomplete="off"
                    >
                    <span class="form-error hidden" id="setup-school-error"></span>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4);">
                    <div class="form-group">
                        <label class="form-label form-label--required" for="setup-class-name">Class</label>
                        <input
                            type="text"
                            id="setup-class-name"
                            class="form-input"
                            placeholder="e.g. Class 10"
                            required
                            autocomplete="off"
                        >
                        <span class="form-error hidden" id="setup-class-error"></span>
                    </div>

                    <div class="form-group">
                        <label class="form-label form-label--required" for="setup-section-name">Section</label>
                        <input
                            type="text"
                            id="setup-section-name"
                            class="form-input"
                            placeholder="e.g. Section B"
                            required
                            autocomplete="off"
                        >
                        <span class="form-error hidden" id="setup-section-error"></span>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary btn--full btn--lg" id="setup-inst-btn" style="margin-top: var(--space-2);">
                    Create Institution
                </button>
            </form>
        </div>

        <!-- Sign In Card -->
        <div class="login-card glass-card--elevated" id="signin-card">
            <div class="login-card__header">
                <div class="login-card__logo login-card__logo--brand">
                    <svg class="logo-icon-svg" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 32px; height: 32px;">
                        <defs>
                            <linearGradient id="logo-grad-login" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#4f46e5" />
                                <stop offset="50%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#a855f7" />
                            </linearGradient>
                        </defs>
                        <path d="M16 2L28 8V20L16 30L4 20V8L16 2Z" class="logo-icon-shield" stroke="url(#logo-grad-login)" stroke-width="2" stroke-linejoin="round" fill="rgba(99, 102, 241, 0.05)" />
                        <path d="M17 7L10 15H16L15 25L22 14H16L17 7Z" class="logo-icon-lightning" fill="url(#logo-grad-login)" />
                    </svg>
                </div>
                <h1 class="login-card__title">Sign In</h1>
                <p class="login-card__subtitle" id="login-subtitle">Welcome back to Anti-Kuddus Protocol</p>
            </div>

            <form class="login-form" id="login-form" novalidate>
                <div class="login-error hidden" id="login-error"></div>

                <div class="form-group">
                    <label class="form-label form-label--required" for="roll-number">Roll Number</label>
                    <input
                        type="number"
                        id="roll-number"
                        class="form-input"
                        placeholder="Enter your roll number"
                        required
                        autocomplete="off"
                    >
                    <span class="form-error hidden" id="roll-error"></span>
                </div>

                <div class="form-group">
                    <label class="form-label form-label--required" for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                    >
                    <span class="form-error hidden" id="password-error"></span>
                </div>

                <button type="submit" class="btn btn--primary btn--full btn--lg" id="login-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign In
                </button>
            </form>

            <div class="login-footer" style="display: flex; flex-direction: column; gap: var(--space-3); align-items: center; justify-content: center; margin-top: var(--space-6);">
                <p>Don't have an account? <a href="setup.html">Sign Up</a></p>
                <button type="button" class="btn btn--ghost btn--sm" id="clear-data-btn" style="color: var(--text-muted); font-size: var(--text-xs); border: 1px solid var(--glass-border); padding: var(--space-1.5) var(--space-4); border-radius: var(--radius-md); background: rgba(239, 68, 68, 0.05); transition: all 0.2s; display: inline-flex; align-items: center; gap: var(--space-1.5);">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    Clear Data
                </button>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
